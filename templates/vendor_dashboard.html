{% extends "base.html" %} {% block content %}
<h2>Vendor Dashboard</h2>
<h3>Low Stock Products (Stock < 20)</h3>
<table border="1">
  <tr>
    <th>Product ID</th>
    <th>UPC</th>
    <th>Brand</th>
    <th>Stock</th>
  </tr>
  {% for item in low_stock %}
  <tr>
    <td>{{ item.product_id }}</td>
    <td>{{ item.UPC }}</td>
    <td>{{ item.brand_name }}</td>
    <td>{{ item.stock_quantity }}</td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
